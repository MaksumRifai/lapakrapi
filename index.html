<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name=viewport content='width=device-width,initial-scale=1'>
  <link rel='stylesheet' href='css/style.css'>
  <script src='https://unpkg.com/html5-qrcode'></script>
</head>
<body>

  <div class='card'>
    <div id='lapakrapi'><img src="logo_lapak_rapi.png" class='logo'></div>
    
    <div id='home'>
      <button onclick="show('scan')">Input Pembayaran</button>
      <button onclick="show('cek')">Cek Detail Lapak</button>
      <button onclick="renderReport();show('laporan')">Status Iuran</button>
    </div>

    <div id='scan' class='page' style="display: none;">
      <h2>Scan QR</h2>
      <p>Scan Gambar QR yang ada di lapak pedagang, atau unggah dari galeri</p>
      <div id='reader'></div>
      <div id='hasil'></div>
      <button onclick="back()">Kembali</button>
    </div>
    
    <div id='cek' class='page' style="display: none;">
      <h2>Detail Lapak</h2>
      <input id='kode' placeholder='Kode Pedagang'>
      <button onclick='cek()'>Cari</button>
      <div id='info'></div>
      <button onclick="back()">Kembali</button>
    </div>
    
    <div id='laporan' class='page' style="display: none;">
      <h2>Laporan/Detail Iuran</h2>
      <table id='tbl' border=1>
        <tr>
          <th>Waktu Bayar</th>
          <th>Kode Usaha</th>
          <th>Nama Usaha</th>
          <th>Nomor Lapak</th>
          <th>Jenis Iuran</th>
        </tr>
      </table>
      <button onclick="back()">Kembali</button>
    </div>
    
    <div id='maxwebtoons'><img src="logo_maxwebtoons_wide.png" class='logo'></div>
    <div id='desainerhub'><img src="desainerhub.png" class='logo'></div>

  </div> <script src='app.js'></script>
</body>
</html>

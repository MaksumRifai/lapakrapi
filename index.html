<!doctype html>
<html>
<head><meta charset='utf-8'><meta name=viewport content='width=device-width,initial-scale=1'><link rel='stylesheet' href='css/style.css'>
<script src='https://unpkg.com/html5-qrcode'></script>
</head>
<body>
<div id='home'><h1>LapakRapi</h1><button onclick="show('scan')">Input Baru</button><button onclick="show('cek')">Cek Lapak</button><button onclick="renderReport();show('laporan')">Laporan</button></div>
<div id='scan' class='page'><h2>Scan QR</h2>
<div id='reader'></div><div id='hasil'></div>
<button onclick="back()">Kembali</button></div>
<div id='cek' class='page'><input id='kode' placeholder='Kode QR'><button onclick='cek()'>Cari</button><pre id='info'></pre><button onclick="back()">Kembali</button></div>
<div id='laporan' class='page'><h2>Laporan</h2><table id='tbl' border=1><tr><th>Waktu</th><th>Pedagang</th><th>Jenis</th></tr></table><button onclick="back()">Kembali</button></div>
<script src='app.js'></script>
</body>
</html>
